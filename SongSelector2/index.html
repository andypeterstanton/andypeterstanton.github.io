<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SongSelector</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body data-theme="dark">
    <div class="app">

      <aside class="sidebar">
        <h1>🎧 SongSelector</h1>

        <div class="menu">
          <button data-action="random">🎲 Random</button>
          <button data-action="toggleFavs">★ Favourites</button>
          <button data-action="theme">🌓 Theme</button>
          <button data-action="reset">↺ Reset</button>
          <button data-action="addSong">➕ Add Song</button>
          <button data-action="bulkAdd">📦 Bulk Add</button>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <input
            id="search"
            type="search"
            placeholder="Search artist, title, tuning..."
          />
        </div>

        <div id="songTable">
          <div class="song-grid">
            <div id="songContainer"></div>
          </div>
        </div>
      </main>

    </div>

    <div class="player">
      <div class="now">
        <div id="nowPlaying">Nothing playing</div>
      </div>
      <audio id="audio" controls preload="none"></audio>
    </div>

    <div class="modal hidden" id="modal">
  <div class="modal-content">
    <h2 id="modalTitle">Add Song</h2>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button id="modalDelete" class="btn-danger hidden">Delete</button>
      <button id="modalSave">Save</button>
      <button id="modalCancel">Cancel</button>
    </div>
  </div>
</div>

    <script src="app.js"></script>
  </body>
</html>
